name: Helm Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5.0.0

      - name: Helm lint
        run: helm lint charts/cloudbeaver

      - name: Helm template
        run: helm template cloudbeaver charts/cloudbeaver >/dev/null
